help help help

Fixed a bug where it was possible to pass in more arguments to  
a commands function then could it handle and resulting in failed
execution without notice

A lot!

- added: better error reporting by returning (DevConsoleError codes)
- added: echo of input has prefix '>' by default
- added: command 'printh', outputs input history
- added: input has now support of new line '\n' and tabs '\t'

- changed: 'help' argument is now optional, when omitted prints general usage info
- changed: 'script' and 'scriptr' do now require 'allowScript' to be true in ModConfig
- changed: 'script' comamnd received better error reporting. Scripts created by this command
  will now call 'queue_free()' and 'return OK' at the end to confirm successful execution. 
  See comment in function body. It is possible to return anything but OK (0) manually. If so 
  a warning message with the returned value will be printed

- changed: input won't be added to history when it equals the last added entry
- changed: methods execute_command, register_command and unregister_command now
  return DevConsoleError codes
- changed: command_args can no longer be null in register_command
- changed: command_description can no longer be null in register_command
- changed: the 'mods' command no longer prints all the files. Only 'zip' and files ending on
  'disabled' extensions will be shown
- changed: command 'modconfig' now returns '<null>' when failed
- changed: command 'restart' now checks for valid PID before shutting down
- changed: empty input will no produce a new line

- others: lots of refactoring

Workshop!

- added: ModWorkshop id, banner and thumbnail
- changed: Disabled eval and script command by default

Publique! Live!

