[0.3.3]
- fixed: 'unregister_command' would not remove the command from autocomplete
- fixed: 'register_command' would fail to return an error in two cases
- changed: extended DevConsoleError enum and added 'get_error_string' function 
  which returns the String version of a given DevConsoleError code
- changed: 'register_command' returns better return codes
- others: version 0.3.2 -> 0.3.3

[0.3.2]

- added: config option 'showConsoleOnStart'
- changed: generate config commands after registering build-in commands
- removed: leftover file (thanks to Oldman)
- others: version 0.3.1 -> 0.3.2

[0.3.1]
Release?

- changed: added generic description to auto generated config commands
- changed: updated README.md
- changed: forgot to update console logo

Style

- added: command suggetions below input field
- added: command completion when pressing "TAB" key
- added: config options 'rememberConsole', 'consoleX', 'consoleY', 'consoleWidth' 
  and 'ConsoleHeight'. If rememberConsole is set to true, DevConsole will save
  the consoles window position and size to config and restore it on game start
- added: options to set the console font color and size in config file
- added: generate source like 'cl_*' commands for every config entry. They can be
  used to get (by ommiting the value) or set the config entry to the new value
- changed: command 'execute_command' has now the option to be called 'quietly'. If 
  passed true a global variable 'print_quietly' will be set. This will make all 
  'print_console' calls return without printing. Then 'set_deffered' will be used 
  to reverse the variable back to false.
- changed: version 0.2.0 -> 0.3.1

