Two new massive command added!

- added: command 'restart', restarts the game
- added: command 'gameData', can be used to modify gameData variables. Supported types are [bool, int, float String]
- added: command 'load', can load any scene relative to res://Scenes/ directory. Watch for side effects in gameData. Don't confuse with LoadScene
- added: command 'log', opens the most recent log file (godot.log)
- changed: renamed 'logs' to 'logsf'
- fixed: parsing boolean in input return always false
- others: refactoring

- added: abilitiy to add optional arguments in commands
- added: command 'modconfig', ability to either get or set a keys value in ModConfig.json. Could be used by mods for configuration
- added: command 'LoadScene', mirrors functionality of Loader.LoadScene

